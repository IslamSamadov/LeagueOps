    <script>
      function logout() {
        // 1. Clear the token
        localStorage.removeItem("token");

        // 2. Redirect to index
        window.location.href = "../index/index.html";
      }

      function displayUser() {
        const token = localStorage.getItem("token");
        if (token) {
          try {
            const decoded = jwt_decode(token);

            // JWT claims usually use these keys for the username:
            const username =
              decoded[
                "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name"
              ] ||
              decoded.unique_name ||
              decoded.sub;

            if (username) {
              document.getElementById("user-display-name").innerText = username;
            }
          } catch (error) {
            console.error("Invalid token", error);
          }
        }
      }

      // Call this when the page loads
      document.addEventListener("DOMContentLoaded", displayUser);

      document.addEventListener("DOMContentLoaded", async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const tourneyId = urlParams.get("id");

        if (!tourneyId) {
          window.location.href = "index.html";
          return;
        }

        const token = localStorage.getItem("token");

        try {
          const response = await fetch(
            `https://localhost:7169/api/Tournament/${tourneyId}`,
            {
              headers: { Authorization: `Bearer ${token}` },
            },
          );

          if (!response.ok) throw new Error("Could not find tournament");

          const data = await response.json();
          renderTournament(data);
        } catch (err) {
          alert(err.message);
        }
      });

      async function createTeam() {
        const teamName = document.getElementById("team-name-input").value;
        const urlParams = new URLSearchParams(window.location.search);
        const tournamentId = urlParams.get("id");
        const token = localStorage.getItem("token");

        if (!teamName) {
          alert("Please enter a team name.");
          return;
        }

        try {
          const response = await fetch("https://localhost:7169/api/Team", {
            method: "POST",
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              name: teamName,
              tournamentId: parseInt(tournamentId),
            }),
          });

          const result = await response.json();

          if (response.ok) {
            alert(result.message);
            location.reload(); // Refresh to see the new team in the list
          } else {
            alert(result.error || "Failed to add team.");
          }
        } catch (err) {
          alert("Error connecting to server.");
        }
      }
      // You'll need the user's ID from the token to check if they are the organizer
      function getUserIdFromToken() {
        const token = localStorage.getItem("token");
        if (!token) return null;
        const payload = JSON.parse(atob(token.split(".")[1]));
        // Adjust key if necessary (e.g., 'UserId' or 'sub')
        return parseInt(payload.UserId || payload.sub);
      }

      function renderTournament(t) {
        const currentUserId = getUserIdFromToken();
        // Ensure this matches the name in your token exactly!
        const isOrganizer =
          t.organizerName ===
          document.getElementById("user-display-name").innerText;

        console.log("Current User ID from Token:", currentUserId);
        console.log("Tournament Organizer ID from API:", t.organizerId);
        console.log("Is Organizer boolean:", isOrganizer);
        console.log("Current Tournament Status:", t.status);

        // 1. Update Basic Info
        document.getElementById("tourney-name").innerText = t.name;
        document.getElementById("tourney-info").innerHTML = `
          <p><strong>Game:</strong> ${t.game}</p>
          <p><strong>Date:</strong> ${new Date(t.startDate).toLocaleDateString()}</p>
          <p><strong>Max Teams:</strong> ${t.maxTeams}</p>
          <p><strong>Status:</strong> <span class="badge badge-primary">${t.status}</span></p>
      `;

        // 2. Control visibility of Add Team card
        const addTeamCard = document.getElementById("add-team-card");
        if (addTeamCard) {
          addTeamCard.style.display = t.status === "Draft" ? "block" : "none";
        }

        // 3. Show Generate Button only if Organizer and Draft
        const adminControls = document.getElementById("admin-controls");
        adminControls.style.display =
          isOrganizer && t.status === "Draft" ? "block" : "none";

        const championBanner = document.getElementById("champion-banner");
        if (t.status === "Completed") {
          // Find the final match to get the winner's name
          const finalMatch = t.matches.find(
            (m) => m.winnerTeamId !== null && m.winnerName !== null,
          );
          if (finalMatch) {
            document.getElementById("winner-name").innerText =
              finalMatch.winnerName;
            championBanner.style.display = "flex";
            championBanner.style.alignItems = "center";
          }
        } else {
          championBanner.style.display = "none";
        }

        // 4. Render Teams
        const tbody = document.getElementById("teams-list");
        if (tbody) {
          tbody.innerHTML = t.teams
            .map(
              (team) => `
    <tr data-team-id="${team.id}">
        <td>
            <strong>${team.name}</strong>
            <div id="players-list-${team.id}" style="display:none; font-size: 0.85em; color: #555;">
                ${
                  team.players && team.players.length > 0
                    ? team.players
                        .map((p) => `• ${p.name} (${p.inGameId})`)
                        .join("<br>")
                    : "<em>No players yet</em>"
                }
            </div>
        </td>
        <td>
            <button class="btn btn-sm btn-info" onclick="togglePlayers(${team.id})">View</button>
            ${
              isOrganizer && t.status === "Draft"
                ? `<button class="btn btn-sm btn-primary ml-2" onclick="openAddPlayerModal(${team.id})">+</button>`
                : ""
            }
        </td>
    </tr>
`,
            )
            .join("");
        }

        // 5. Render Bracket (Updated with Champion Highlight)
        const bracketDiv = document.getElementById("bracket-view");
        if (!t.matches || t.matches.length === 0) {
          bracketDiv.innerHTML = `<p class="text-muted">No matches generated yet.</p>`;
        } else {
          bracketDiv.innerHTML = t.matches
            .map((m) => {
              const hasWinner = !!m.winnerName;
              const showButtons = isOrganizer && !hasWinner;

              // Logic to highlight if this is a completed tournament and this team won
              const isWinnerA =
                t.status === "Completed" && m.winnerTeamId === m.teamAId;
              const isWinnerB =
                t.status === "Completed" && m.winnerTeamId === m.teamBId;

              return `
              <div class="p-3 border mb-3 rounded bg-white shadow-sm">
                  <div class="d-flex justify-content-between align-items-center">
                      <div>
                          <span class="badge badge-secondary">Round ${m.roundNumber}</span>
                          <div class="mt-2">
                              <button class="btn btn-sm ${showButtons ? "btn-outline-success" : "btn-light"} ${isWinnerA ? "champion-highlight" : ""}"
                                      ${showButtons ? `onclick="resolveMatch(${m.id}, ${m.teamAId})"` : "disabled"}>
                                  ${m.teamAName}
                              </button>
                              <span class="mx-2">vs</span>
                              ${
                                m.teamBId
                                  ? `<button class="btn btn-sm ${showButtons ? "btn-outline-success" : "btn-light"} ${isWinnerB ? "champion-highlight" : ""}"
                                            ${showButtons ? `onclick="resolveMatch(${m.id}, ${m.teamBId})"` : "disabled"}>
                                      ${m.teamBName}
                                  </button>`
                                  : "BYE"
                              }
                          </div>
                      </div>
                      ${hasWinner ? `<div class="text-success font-weight-bold">✓ ${m.winnerName}</div>` : ""}
                  </div>
              </div>`;
            })
            .join("");
        }
      }
      function togglePlayers(teamId) {
        const list = document.getElementById(`players-list-${teamId}`);
        list.style.display = list.style.display === "none" ? "block" : "none";
      }
      async function loadTournamentDetails() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        // Adding a timestamp ensures the browser sees this as a 'new' request every time
        const timestamp = new Date().getTime();

        const response = await fetch(
          `https://localhost:7169/api/Tournament/${id}?t=${timestamp}`,
          {
            headers: {
              Authorization: `Bearer ${localStorage.getItem("token")}`,
              "Cache-Control": "no-cache", // Explicitly tell browser not to cache
              Pragma: "no-cache",
            },
          },
        );

        const data = await response.json();
        renderTournament(data);
      }
      async function generateBracket() {
        const urlParams = new URLSearchParams(window.location.search);
        const tourneyId = urlParams.get("id");
        const token = localStorage.getItem("token");

        // NOTICE: Route changed to /api/Match/generate/
        try {
          const response = await fetch(
            `https://localhost:7169/api/Match/generate/${tourneyId}`,
            {
              method: "POST",
              headers: {
                Authorization: `Bearer ${token}`,
              },
            },
          );

          if (response.ok) {
            const result = await response.json();
            alert(result.message);
            location.reload();
          } else {
            const error = await response.json();
            alert(error.error || "Generation failed.");
          }
        } catch (err) {
          alert("Error connecting to MatchController.");
        }
      }
      async function resolveMatch(matchId, winnerId) {
        if (!confirm("Are you sure you want to set this team as the winner?"))
          return;

        const token = localStorage.getItem("token");

        try {
          const response = await fetch(
            `https://localhost:7169/api/Match/${matchId}/resolve`,
            {
              method: "POST",
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ winnerId: winnerId }),
            },
          );

          const result = await response.json();

          if (response.ok) {
            alert(result.message);
            location.reload(); // Refresh the page to show the new bracket/winners
          } else {
            alert(result.error || "Failed to resolve match.");
          }
        } catch (err) {
          alert("Error connecting to server.");
        }
      }
      // 1. Open the modal and store the Team ID
      function openAddPlayerModal(teamId) {
        document.getElementById("modal-team-id").value = teamId;
        $("#addPlayerModal").modal("show");
      }

      // 2. The actual API submission
      async function submitPlayer() {
        const teamId = document.getElementById("modal-team-id").value;
        const name = document.getElementById("modal-name").value;
        const inGameId = document.getElementById("modal-igid").value;

        const response = await fetch("https://localhost:7169/api/Player/add", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${localStorage.getItem("token")}`,
          },
          body: JSON.stringify({ teamId, name, inGameId }),
        });

        if (response.ok) {
          $("#addPlayerModal").modal("hide");

          // INSTANT UPDATE: Find the specific row and increment its counter
          const row = document.querySelector(`tr[data-team-id="${teamId}"]`);
          const counterSpan = document.getElementById(`player-count-${teamId}`);
          if (counterSpan) {
            counterSpan.innerText = parseInt(counterSpan.innerText) + 1;
          } else {
            // If we can't find it easily, just reload once
            await loadTournamentDetails();
          }
        } else {
          const error = await response.json();
          alert("Error: " + (error.message || "Failed to add player"));
        }
      }
