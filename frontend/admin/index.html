    <script>
      function logout() {
        // 1. Clear the token
        localStorage.removeItem("token");

        // 2. Redirect to index
        window.location.href = "../index/index.html";
      }
      async function loadTournaments() {
        const token = localStorage.getItem("token");
        const tbody = document.getElementById("tournament-list-body");

        try {
          const response = await fetch(
            "https://localhost:7169/api/Tournament/my",
            {
              method: "GET",
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
              },
            },
          );

          if (!response.ok) throw new Error("Failed to fetch");

          const tournaments = await response.json();
          tbody.innerHTML = ""; // Clear loading spinner or old data
          if (tournaments.length === 0) {
            tbody.innerHTML =
              '<tr><td colspan="5" class="text-center">You haven\'t created any tournaments yet. <a href="create.html">Create one now!</a></td></tr>';
            return;
          }

          tournaments.forEach((t) => {
            tbody.innerHTML += `
                    <tr>
                        <td>${t.name}</td>
                        <td>${t.game}</td>
                        <td><span class="badge badge-primary">${t.status || "Upcoming"}</span></td>
                        <td>
                            ${t.teamCount > 0 ? `${t.teamCount} /${t.maxTeams}` : '<span class="text-muted">No teams yet</span>'}
                        </td>
                        <td style="display: flex; justify-self: center; justify-content: space-around; width: 100%;">
                                      <a href="details.html?id=${t.id}" class="btn btn-primary btn-sm">
                        <i class="fas fa-eye"></i> Manage
                         </a>
                            <button class="btn btn-danger btn-sm" onclick="deleteTournament(${t.id})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </td>
                    </tr>
                `;
          });
        } catch (err) {
          console.error(err);
          tbody.innerHTML =
            '<tr><td colspan="5" class="text-center text-danger">Error loading tournaments.</td></tr>';
        }
      }

      // Call the function when the page loads
      document.addEventListener("DOMContentLoaded", loadTournaments);

      function displayUser() {
        const token = localStorage.getItem("token");
        if (token) {
          try {
            const decoded = jwt_decode(token);

            // JWT claims usually use these keys for the username:
            const username =
              decoded[
                "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name"
              ] ||
              decoded.unique_name ||
              decoded.sub;

            if (username) {
              document.getElementById("user-display-name").innerText = username;
            }
          } catch (error) {
            console.error("Invalid token", error);
          }
        }
      }

      // Call this when the page loads
      document.addEventListener("DOMContentLoaded", displayUser);

      async function deleteTournament(id) {
        // 1. Confirm with the user before destroying data
        if (!confirm("Are you sure you want to delete this tournament?")) {
          return;
        }

        const token = localStorage.getItem("token");

        try {
          const response = await fetch(
            `https://localhost:7169/api/Tournament/${id}`,
            {
              method: "DELETE",
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
              },
            },
          );

          if (response.ok) {
            alert("Tournament deleted successfully!");
            // 2. Refresh the table list immediately after success
            loadTournaments();
          } else {
            const errorData = await response.json();
            alert(errorData.error || "Failed to delete tournament.");
          }
        } catch (err) {
          console.error("Error deleting:", err);
          alert("An error occurred while deleting.");
        }
      }
    </script>
