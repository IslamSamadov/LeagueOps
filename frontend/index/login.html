<!doctype html>
<html lang="zxx">
  <head>
    <title>League Ops</title>
    <meta charset="UTF-8" />
    <meta name="description" content="Game Warrior Template" />
    <meta name="keywords" content="warrior, game, creative, html" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Favicon -->
    <link href="img/favicon.ico" rel="shortcut icon" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:400,400i,500,500i,700,700i"
      rel="stylesheet"
    />

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/font-awesome.min.css" />
    <link rel="stylesheet" href="css/owl.carousel.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/login-register.css" />
    <link rel="stylesheet" href="css/animate.css" />

    <!--[if lt IE 9]>
      <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
      <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->

  <body>
    <!-- Page Preloder -->
    <div id="preloder">
      <div class="loader"></div>
    </div>

    <!-- Header section -->
    <header class="header-section">
      <div class="container">
        <!-- logo -->
        <a class="site-logo" href="index.html">
          <h2>
            <span style="color: white">League</span
            ><span style="color: #eda61e">Ops</span>
          </h2>
        </a>
        <!-- responsive -->
        <div class="nav-switch">
          <i class="fa fa-bars"></i>
        </div>
        <!-- site menu -->
        <nav class="main-menu">
          <ul id="menu-list" style="display: flex">
            <li style="margin-right: 30px">
              <a class="my-class" href="index.html">Home</a>
            </li>

            <li id="auth-links">
              <a href="login.html">Login</a>
              <a href="register.html">Register</a>
            </li>

            <li id="user-profile" style="display: none">
              <a href="../admin/index.html" id="username-display"></a>
              <a href="#" onclick="logout()">Logout</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <!-- Header section end -->
    <section class="login-section spad">
      <div class="container">
        <div
          class="login-card"
          style="
            background: #17191a;
            padding: 40px;
            border-radius: 10px;
            max-width: 500px;
            margin: 0 auto;
          "
        >
          <h2 style="color: #ffb320; margin-bottom: 30px">Organizer Login</h2>

          <input
            type="text"
            id="login-username"
            placeholder="Username"
            style="
              width: 100%;
              padding: 10px;
              margin-bottom: 20px;
              background: #333;
              border: none;
              color: white;
            "
          />

          <input
            type="password"
            id="login-password"
            placeholder="Password"
            style="
              width: 100%;
              padding: 10px;
              margin-bottom: 20px;
              background: #333;
              border: none;
              color: white;
            "
          />

          <button onclick="handleLogin()" class="site-btn">Login</button>

          <p id="error-msg" style="color: red; margin-top: 15px"></p>
        </div>
      </div>
    </section>
    <!-- Footer section -->
    <footer class="footer-section">
      <div class="container">
        <ul class="footer-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="register.html">Register</a></li>
        </ul>
        <p class="copyright">
          <!-- Link back to Colorlib can't be removed. Template is licensed under CC BY 3.0. -->
          Copyright &copy;
          <script>
            document.write(new Date().getFullYear());
          </script>
          All rights reserved | This template is made with
          <i class="fa fa-heart-o" aria-hidden="true"></i> by
          <a href="https://colorlib.com" target="_blank">Colorlib</a>
          <!-- Link back to Colorlib can't be removed. Template is licensed under CC BY 3.0. -->
        </p>
      </div>
    </footer>
    <!-- Footer section end -->
    <!--====== Javascripts & Jquery ======-->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const token = localStorage.getItem("token");
        const authLinks = document.getElementById("auth-links");
        const userProfile = document.getElementById("user-profile");
        const usernameDisplay = document.getElementById("username-display");

        if (token) {
          authLinks.style.display = "none";
          userProfile.style.display = "inline";

          const payload = JSON.parse(atob(token.split(".")[1]));

          // Use the key you found in the console logs
          const username =
            payload[
              "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name"
            ] ||
            payload.unique_name ||
            payload.name ||
            "User";

          usernameDisplay.innerText = username;
        } else {
          // User is not logged in
          authLinks.style.display = "block";
          userProfile.style.display = "none";
        }
      });

      function logout() {
        localStorage.removeItem("token");
        window.location.href = "index.html";
      }
      async function handleLogin() {
        const userField = document.getElementById("login-username");
        const passField = document.getElementById("login-password");
        const btn = document.querySelector(".site-btn");
        const errorMsg = document.getElementById("error-msg");

        // 1. Basic Client-Side Validation
        if (!userField.value.trim() || !passField.value.trim()) {
          showError("Fields cannot be empty.");
          return;
        }

        // 2. Prepare for Request
        setLoading(true);

        try {
          const response = await fetch(
            "https://localhost:7169/api/Auth/login",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                Username: userField.value.trim(),
                Password: passField.value,
              }),
            },
          );

          // 3. Handle API Response
          if (response.ok) {
            const data = await response.json();

            // Store token securely (as secure as localStorage allows)
            localStorage.setItem("token", data.token);
            localStorage.setItem("username", userField.value);

            window.location.href = "../admin/index.html";
          } else {
            // Handle 400 Bad Request or 401 Unauthorized
            const errData = await response
              .json()
              .catch(() => ({ message: "Unknown error" }));
            showError(errData.message || "Invalid username or password.");
          }
        } catch (err) {
          // Handle Network Errors (Server down, CORS, etc.)
          console.error("Login Error:", err);
          showError("System unreachable. Please try again later.");
        } finally {
          setLoading(false);
        }
      }

      // Helper functions to keep code clean
      function showError(msg) {
        const errorMsg = document.getElementById("error-msg");
        errorMsg.innerText = msg;
        errorMsg.style.display = "block";
      }

      function setLoading(isLoading) {
        const btn = document.querySelector(".site-btn");
        btn.innerText = isLoading ? "Authenticating..." : "Login";
        btn.disabled = isLoading;
      }
    </script>
    <script src="js/jquery-3.2.1.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/owl.carousel.min.js"></script>
    <script src="js/jquery.marquee.min.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
