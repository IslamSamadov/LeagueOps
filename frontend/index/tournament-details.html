  <body>
    <!-- Page Preloder -->
    <div id="preloder">
      <div class="loader"></div>
    </div>

    <!-- Header section -->
    <header class="header-section">
      <div class="container">
        <!-- logo -->
        <a class="site-logo" href="index.html">
          <h2>
            <span style="color: white">League</span
            ><span style="color: #eda61e">Ops</span>
          </h2>
        </a>
        <!-- responsive -->
        <div class="nav-switch">
          <i class="fa fa-bars"></i>
        </div>
        <!-- site menu -->
        <nav class="main-menu">
          <ul id="menu-list" style="display: flex">
            <li style="margin-right: 30px">
              <a class="my-class" href="index.html">Home</a>
            </li>

            <li id="auth-links">
              <a href="login.html">Login</a>
              <a href="register.html">Register</a>
            </li>

            <li id="user-profile" style="display: none">
              <a href="../admin/index.html" id="username-display"></a>
              <a href="#" onclick="logout()">Logout</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <!-- Header section end -->

    <!-- Tournaments section -->
    <section class="spad">
      <div class="container">
        <h2 id="tourney-name"></h2>
        <div id="tourney-info"></div>

        <div
          id="champion-banner"
          style="display: none; padding: 20px; background: gold; border-radius: 10px;margin-bottom: 20px;"
        >
          <h3>Winner: <span id="winner-name"></span></h3>
        </div>

        <h3>Teams</h3>
        <table class="table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Players</th>
            </tr>
          </thead>
          <tbody id="teams-list"></tbody>
        </table>

        <h3>Bracket</h3>
        <div id="bracket-view"></div>
      </div>
    </section>
    <!-- Tournaments section bg -->
    <!-- Footer section -->
    <footer class="footer-section">
      <div class="container">
        <ul class="footer-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="register.html">Register</a></li>

    <!--====== Javascripts & Jquery ======-->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const token = localStorage.getItem("token");
        const authLinks = document.getElementById("auth-links");
        const userProfile = document.getElementById("user-profile");
        const usernameDisplay = document.getElementById("username-display");

        if (token) {
          authLinks.style.display = "none";
          userProfile.style.display = "inline";

          const payload = JSON.parse(atob(token.split(".")[1]));

          // Use the key you found in the console logs
          const username =
            payload[
              "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name"
            ] ||
            payload.unique_name ||
            payload.name ||
            "User";

          usernameDisplay.innerText = username;
        } else {
          // User is not logged in
          authLinks.style.display = "block";
          userProfile.style.display = "none";
        }
      });

      function logout() {
        localStorage.removeItem("token");
        window.location.href = "index.html";
      }
      async function loadTournamentDetails() {
        // 1. Get the ID from the URL (e.g., ?id=11)
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        // 2. Fetch specific tournament data
        const response = await fetch(
          `https://localhost:7169/api/Tournament/${id}`,
        );
        const tournament = await response.json();

        // 3. Reuse your render logic
        renderTournament(tournament);
      }
      function renderTournament(t) {
        // PUBLIC VIEW: We force isOrganizer to false to hide admin controls
        const isOrganizer = false;

        console.log("Rendering Tournament:", t.name, "Status:", t.status);

        // 1. Update Basic Info
        document.getElementById("tourney-name").innerText = t.name;
        document.getElementById("tourney-info").innerHTML = `
        <p><strong>Game:</strong> ${t.game}</p>
        <p><strong>Date:</strong> ${new Date(t.startDate).toLocaleDateString()}</p>
        <p><strong>Max Teams:</strong> ${t.maxTeams}</p>
        <p><strong>Status:</strong> <span class="badge badge-primary">${t.status}</span></p>
    `;

        // 2. Control visibility of Add Team card
        const addTeamCard = document.getElementById("add-team-card");
        if (addTeamCard) {
          addTeamCard.style.display = "none"; // Always hidden for public
        }

        // 3. Admin controls are always hidden for public
        const adminControls = document.getElementById("admin-controls");
        if (adminControls) {
          adminControls.style.display = "none";
        }

        // 4. Champion Banner (Public view still shows the winner!)
        const championBanner = document.getElementById("champion-banner");
        if (championBanner && t.status === "Completed") {
          const finalMatch = t.matches.find((m) => m.winnerTeamId !== null);
          if (finalMatch) {
            document.getElementById("winner-name").innerText =
              finalMatch.winnerName;
            championBanner.style.display = "flex";
          }
        } else if (championBanner) {
          championBanner.style.display = "none";
        }

        // 5. Render Teams (List only, no Add Player buttons)
        const tbody = document.getElementById("teams-list");
        if (tbody) {
          tbody.innerHTML = t.teams
            .map(
              (team) => `
            <tr>
                <td>${team.name}</td>
                <td>${team.players ? team.players.length : 0}</td>
            </tr>
        `,
            )
            .join("");
        }

        // 6. Render Bracket (Matches only, resolution buttons disabled)
        const bracketDiv = document.getElementById("bracket-view");
        if (!t.matches || t.matches.length === 0) {
          bracketDiv.innerHTML = `<p class="text-muted">No matches generated yet.</p>`;
        } else {
          bracketDiv.innerHTML = t.matches
            .map((m) => {
              const hasWinner = !!m.winnerName;
              const isWinnerA =
                t.status === "Completed" && m.winnerTeamId === m.teamAId;
              const isWinnerB =
                t.status === "Completed" && m.winnerTeamId === m.teamBId;

              return `
            <div class="p-3 border mb-3 rounded bg-white shadow-sm">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <span class="badge badge-secondary">Round ${m.roundNumber}</span>
                        <div class="mt-2">
                            <button class="btn btn-sm btn-light ${isWinnerA ? "champion-highlight" : ""}" disabled>
                                ${m.teamAName}
                            </button> 
                            <span class="mx-2">vs</span> 
                            ${
                              m.teamBId
                                ? `<button class="btn btn-sm btn-light ${isWinnerB ? "champion-highlight" : ""}" disabled>
                                    ${m.teamBName}
                                  </button>`
                                : "BYE"
                            }
                        </div>
                    </div>
                    ${hasWinner ? `<div class="text-success font-weight-bold">✓ ${m.winnerName}</div>` : ""}
                </div>
            </div>`;
            })
            .join("");
        }
      }
      // Run this when the page loads
      loadTournamentDetails();
    </script>
    <script src="js/jquery-3.2.1.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/owl.carousel.min.js"></script>
    <script src="js/jquery.marquee.min.js"></script>
    <script src="js/main.js"></script>
  </body>
